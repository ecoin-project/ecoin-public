name: Weekly Observation

permissions:
  contents: write

on:
  schedule:
    - cron: "0 1 * * 6"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Run weekly batch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/run_weekly.py

      - name: Score outputs
        env:
          USE_MANUAL_SAMPLE: "1"
          MANUAL_BATCH_ID: "manual_batch_003"
        run: python scripts/score_outputs.py

      - name: Plot trends
        run: python scripts/plot_master_summary.py

      - name: Fetch market reference
        run: python scripts/fetch_market_reference.py

      - name: Commit market reference update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_reference.csv
          git diff --cached --quiet || git commit -m "Update market reference CSV"
          git push

      - name: Plot market reference
        run: python scripts/plot_market_reference.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: outputs/
